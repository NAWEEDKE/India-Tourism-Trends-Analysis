<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Tourism Field Notes - Notebook</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            font-family: var(--font-hand);
            font-size: 1.5rem;
            color: var(--ink-medium);
        }
        .loading-spinner {
            font-size: 3rem;
            margin-bottom: 15px;
            animation: spin 1.5s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: var(--accent-red);
            font-family: var(--font-hand);
            font-size: 1.3rem;
            padding: 20px;
            border: 2px dashed var(--accent-red);
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
            background: rgba(200, 90, 73, 0.05);
        }
    </style>
</head>
<body>

    <div class="notebook" id="notebook-main">
        <div class="notebook-spine"></div>
        <div class="notebook-rings">
            <div class="ring"></div><div class="ring"></div><div class="ring"></div>
            <div class="ring"></div><div class="ring"></div><div class="ring"></div>
            <div class="ring"></div><div class="ring"></div><div class="ring"></div>
            <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        </div>

        <div class="notebook-tabs">
            <a href="index.html"       class="tab-link tab-home"      id="link-home">      <i class="fa-solid fa-book-open"></i> Overview</a>
            <a href="seasonality.html" class="tab-link tab-season"    id="link-season">    <i class="fa-solid fa-calendar-days"></i> Seasonality</a>
            <a href="monuments.html"   class="tab-link tab-monuments" id="link-monuments"> <i class="fa-solid fa-landmark"></i> Monuments</a>
            <a href="circles.html"     class="tab-link tab-circles"   id="link-circles">   <i class="fa-solid fa-circle-nodes"></i> Circles</a>
            <a href="predict.html"     class="tab-link tab-predict"   id="link-predict">   <i class="fa-solid fa-wand-magic-sparkles"></i> Predict</a>
            <a href="notebook.html"    class="tab-link tab-notebook active" id="link-notebook"><i class="fa-solid fa-code"></i> Notebook</a>
            <a href="guide.html"       class="tab-link tab-guide"     id="link-guide">     <i class="fa-solid fa-compass"></i> Guide</a>
        </div>

        <main class="paper-content" style="max-height: 850px; overflow: hidden;">
            <header class="header-actions" style="margin-bottom: 20px;">
                <div>
                    <h1 class="journal-title">Research Notebook</h1>
                    <div class="journal-subtitle">India Tourism Trends Analysis (Jupyter Pipeline)</div>
                </div>
                <div class="handwritten-note" style="font-family: var(--font-hand); font-size: 1.1rem;" id="pipeline-status">
                    Connecting to Pipeline...
                </div>
            </header>

            <div class="notebook-scroll-container">
                <div class="loading-container" id="loading-view">
                    <div class="loading-spinner"><i class="fa-solid fa-cog fa-spin"></i></div>
                    <div>Compiling Analysis Cells...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <script>
        async function fetchNotebook() {
            const container = document.querySelector('.notebook-scroll-container');
            const statusLabel = document.getElementById('pipeline-status');
            try {
                const response = await fetch('http://localhost:5050/api/notebook');
                if (!response.ok) {
                    throw new Error('API server responded with error');
                }
                const data = await response.json();
                
                // Inject the compiled HTML
                container.innerHTML = data.cells_html;
                statusLabel.innerHTML = 'Dynamic Pipeline Connected';
                
                // Trigger Prism highlighting
                if (window.Prism) {
                    Prism.highlightAll();
                }
            } catch (error) {
                console.error('Error fetching notebook:', error);
                statusLabel.innerHTML = 'Connection Failed';
                container.innerHTML = `
                    <div class="error-msg">
                        <h3>Could Not Connect to ML API Server</h3>
                        <p>To view the dynamic Jupyter analysis notebook, the Python Flask API must be running.</p>
                        <p style="margin-top: 15px; font-size: 1rem; color: var(--ink-dark);">
                            Run: <code>python model_api.py</code> in the project directory.
                        </p>
                    </div>
                `;
            }
        }
        
        window.addEventListener('DOMContentLoaded', fetchNotebook);
    </script>
</body>
</html>
